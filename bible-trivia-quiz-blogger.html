<meta charset="UTF-8">
<style>

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Sans+Tamil:wght@400;600&family=Inter:wght@400;500;600&display=swap');
  :root {
    --gold:#C9A84C;--gold-light:#F0D080;--deep:#1A1206;
    --parchment:#F5EDD8;--parchment-dark:#E8D9B8;
    --crimson:#8B1A1A;--scroll:#2C1F0E;--text:#2C1F0E;
    --muted:#7A6A50;--correct:#2D6A2D;--wrong:#8B1A1A;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--deep);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background-image:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(139,26,26,0.08) 0%,transparent 60%);}
  .card{background:var(--parchment);border-radius:16px;width:100%;max-width:620px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.3);}
  .card-header{background:linear-gradient(135deg,var(--scroll) 0%,#1A1206 100%);padding:28px 28px 20px;text-align:center;border-bottom:2px solid var(--gold);position:relative;}
  .card-header::after{content:'✦ ✝ ✦';display:block;color:var(--gold);font-size:13px;letter-spacing:8px;margin-top:8px;opacity:0.7;}
  .game-title{font-family:'Cinzel',serif;font-size:clamp(20px,4vw,28px);font-weight:800;color:var(--gold-light);letter-spacing:2px;}
  .game-subtitle{font-family:'Noto Sans Tamil',sans-serif;font-size:14px;color:var(--gold);opacity:0.8;margin-top:4px;}
  .lang-toggle{position:absolute;top:16px;right:16px;display:flex;gap:4px;}
  .lang-btn{background:transparent;border:1px solid rgba(201,168,76,0.4);color:var(--gold);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
  .lang-btn.active{background:var(--gold);color:var(--deep);}
  .card-body{padding:28px;}
  .screen{display:none;}.screen.active{display:block;}
  .start-form{display:flex;flex-direction:column;gap:16px;}
  .field-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .text-input{width:100%;padding:12px 16px;border:1.5px solid var(--parchment-dark);border-radius:var(--radius);background:white;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
  .text-input:focus{border-color:var(--gold);}
  .difficulty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .diff-btn{padding:10px 8px;border-radius:var(--radius);border:1.5px solid var(--parchment-dark);background:white;cursor:pointer;text-align:center;transition:all 0.2s;}
  .diff-btn .diff-icon{font-size:20px;display:block;margin-bottom:4px;}
  .diff-btn .diff-label{font-size:12px;font-weight:600;color:var(--muted);}
  .diff-btn.selected{border-color:var(--gold);background:rgba(201,168,76,0.1);}
  .diff-btn.selected .diff-label{color:var(--scroll);}
  .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold) 0%,#A8862E 100%);color:var(--deep);font-family:'Cinzel',serif;font-size:15px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:1px;transition:opacity 0.2s,transform 0.1s;box-shadow:0 4px 16px rgba(201,168,76,0.3);}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-secondary{padding:10px 20px;background:transparent;color:var(--muted);font-size:13px;border:1.5px solid var(--parchment-dark);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;}
  .btn-secondary:hover{border-color:var(--gold);color:var(--scroll);}
  .quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .q-counter{font-family:'Cinzel',serif;font-size:13px;color:var(--muted);font-weight:600;}
  .score-badge{background:var(--scroll);color:var(--gold-light);font-size:13px;font-weight:600;padding:4px 14px;border-radius:20px;font-family:'Cinzel',serif;}
  .timer-bar-wrap{background:var(--parchment-dark);height:5px;border-radius:4px;margin-bottom:20px;overflow:hidden;}
  .timer-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--crimson));border-radius:4px;transition:width 1s linear;}
  .question-text{font-family:'Cinzel',serif;font-size:clamp(14px,3vw,17px);color:var(--scroll);font-weight:600;line-height:1.5;margin-bottom:6px;min-height:52px;}
  .question-ref{font-size:11px;color:var(--muted);margin-bottom:20px;font-style:italic;}
  .options-grid{display:flex;flex-direction:column;gap:10px;}
  .option-btn{padding:13px 16px;background:white;border:1.5px solid var(--parchment-dark);border-radius:var(--radius);text-align:left;cursor:pointer;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:12px;line-height:1.4;}
  .option-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(201,168,76,0.05);}
  .option-btn .opt-letter{width:26px;height:26px;border-radius:50%;background:var(--parchment-dark);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
  .option-btn.correct{background:rgba(45,106,45,0.08);border-color:var(--correct);}
  .option-btn.correct .opt-letter{background:var(--correct);color:white;}
  .option-btn.wrong{background:rgba(139,26,26,0.08);border-color:var(--wrong);}
  .option-btn.wrong .opt-letter{background:var(--wrong);color:white;}
  .option-btn:disabled{cursor:default;}
  .feedback-bar{margin-top:16px;padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;display:none;}
  .feedback-bar.show{display:block;}
  .feedback-bar.correct{background:rgba(45,106,45,0.1);color:var(--correct);border:1px solid rgba(45,106,45,0.2);}
  .feedback-bar.wrong{background:rgba(139,26,26,0.08);color:var(--wrong);border:1px solid rgba(139,26,26,0.15);}
  .next-btn-wrap{margin-top:16px;text-align:right;display:none;}
  .next-btn-wrap.show{display:block;}
  .loading-state{text-align:center;padding:40px 20px;}
  .spinner{width:36px;height:36px;border:3px solid var(--parchment-dark);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:var(--muted);font-size:14px;}
  .result-crown{text-align:center;font-size:52px;margin-bottom:8px;}
  .result-title{font-family:'Cinzel',serif;font-size:22px;color:var(--scroll);text-align:center;font-weight:800;margin-bottom:4px;}
  .result-score-big{text-align:center;font-family:'Cinzel',serif;font-size:42px;font-weight:800;color:var(--gold);margin:12px 0 4px;}
  .result-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px;}
  .result-verse{background:var(--scroll);color:var(--gold-light);border-radius:var(--radius);padding:16px 20px;font-size:13px;line-height:1.6;text-align:center;font-style:italic;margin-bottom:24px;}
  .result-actions{display:flex;gap:10px;}
  .result-actions .btn-primary{flex:1;}
  .lb-title{font-family:'Cinzel',serif;font-size:18px;color:var(--scroll);font-weight:800;margin-bottom:4px;text-align:center;}
  .lb-subtitle{text-align:center;color:var(--muted);font-size:12px;margin-bottom:20px;}
  .lb-list{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;}
  .lb-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:white;border-radius:var(--radius);border:1.5px solid var(--parchment-dark);}
  .lb-item.top-1{border-color:#C9A84C;background:rgba(201,168,76,0.05);}
  .lb-item.top-2{border-color:#A8A8A8;}
  .lb-item.top-3{border-color:#CD7F32;}
  .lb-rank{font-family:'Cinzel',serif;font-size:14px;font-weight:800;color:var(--muted);width:24px;text-align:center;flex-shrink:0;}
  .lb-rank.gold{color:#C9A84C;}.lb-rank.silver{color:#A8A8A8;}.lb-rank.bronze{color:#CD7F32;}
  .lb-name{flex:1;font-weight:600;font-size:14px;color:var(--text);}
  .lb-meta{font-size:11px;color:var(--muted);}
  .lb-score{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--scroll);}
  .lb-empty{text-align:center;color:var(--muted);font-size:14px;padding:32px;}
  .lb-back{margin-top:16px;}
  .tab-row{display:flex;gap:8px;margin-bottom:20px;}
  .tab-btn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--parchment-dark);background:white;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;text-align:center;}
  .tab-btn.active{background:var(--scroll);color:var(--gold-light);border-color:var(--scroll);}
  .error-msg{color:var(--crimson);font-size:12px;text-align:center;margin-top:8px;display:none;}
  .error-msg.show{display:block;}
  .fb-status{font-size:11px;text-align:center;padding:7px 12px;border-radius:8px;margin-bottom:12px;display:none;}
  .fb-status.show{display:block;}
  .fb-status.ok{background:rgba(45,106,45,0.1);color:var(--correct);}
  .fb-status.err{background:rgba(139,26,26,0.08);color:var(--wrong);}

</style>

<div class="card">
  <div class="card-header">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
      <button class="lang-btn" onclick="setLang('ta')" id="btn-ta">த</button>
    </div>
    <div class="game-title" id="main-title">BIBLE TRIVIA</div>
    <div class="game-subtitle" id="main-subtitle">பைபிள் வினாடி வினா</div>
  </div>
  <div class="card-body">

    <!-- START -->
    <div class="screen active" id="screen-start">
      <div class="fb-status" id="fb-status"></div>
      <div class="start-form">
        <div>
          <div class="field-label" id="lbl-name">Your Name</div>
          <input class="text-input" id="player-name" type="text" placeholder="Enter your name..." maxlength="24"/>
        </div>
        <div>
          <div class="field-label" id="lbl-diff">Choose Difficulty</div>
          <div class="difficulty-grid">
            <div class="diff-btn selected" onclick="selectDiff('easy',this)">
              <span class="diff-icon">🕊️</span><span class="diff-label" id="diff-easy">Easy</span>
            </div>
            <div class="diff-btn" onclick="selectDiff('medium',this)">
              <span class="diff-icon">✝️</span><span class="diff-label" id="diff-medium">Medium</span>
            </div>
            <div class="diff-btn" onclick="selectDiff('hard',this)">
              <span class="diff-icon">📖</span><span class="diff-label" id="diff-hard">Hard</span>
            </div>
          </div>
        </div>
        <button class="btn-primary" onclick="startGame()"><span id="lbl-start-btn">Begin Quiz</span></button>
        <div style="text-align:center">
          <button class="btn-secondary" onclick="showLeaderboard()" id="lbl-lb-btn">🏆 Leaderboard</button>
        </div>
        <div class="error-msg" id="start-error"></div>
      </div>
    </div>

    <!-- LOADING -->
    <div class="screen" id="screen-loading">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text" id="lbl-loading">Preparing your questions...</div>
      </div>
    </div>

    <!-- QUIZ -->
    <div class="screen" id="screen-quiz">
      <div class="quiz-meta">
        <div class="q-counter" id="q-counter">Question 1 / 10</div>
        <div class="score-badge" id="score-display">Score: 0</div>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
      <div class="question-text" id="question-text"></div>
      <div class="question-ref" id="question-ref"></div>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-bar" id="feedback-bar"></div>
      <div class="next-btn-wrap" id="next-btn-wrap">
        <button class="btn-primary" style="width:auto;padding:10px 28px" onclick="nextQuestion()">
          <span id="lbl-next">Next →</span>
        </button>
      </div>
    </div>

    <!-- RESULT -->
    <div class="screen" id="screen-result">
      <div class="result-crown" id="result-crown">🏆</div>
      <div class="result-title" id="result-title">Well Done!</div>
      <div class="result-score-big" id="result-score">850</div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-verse" id="result-verse"></div>
      <div class="result-actions">
        <button class="btn-secondary" onclick="showLeaderboard()">🏆</button>
        <button class="btn-primary" onclick="resetGame()"><span id="lbl-play-again">Play Again</span></button>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="screen" id="screen-leaderboard">
      <div class="lb-title" id="lbl-lb-title">🏆 Leaderboard</div>
      <div class="lb-subtitle" id="lbl-lb-sub">Top Bible Scholars</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="filterLB('all',this)" id="tab-all-lb">All</button>
        <button class="tab-btn" onclick="filterLB('easy',this)" id="tab-easy-lb">Easy</button>
        <button class="tab-btn" onclick="filterLB('medium',this)" id="tab-med-lb">Medium</button>
        <button class="tab-btn" onclick="filterLB('hard',this)" id="tab-hard-lb">Hard</button>
      </div>
      <div class="lb-list" id="lb-list"><div class="lb-empty" id="lbl-lb-empty">No scores yet. Be the first!</div></div>
      <div class="lb-back">
        <button class="btn-secondary" style="width:100%" onclick="showScreen('screen-start')">
          <span id="lbl-back">← Back</span>
        </button>
      </div>
    </div>

  </div>
</div>

setTimeout(() => fbEl.classList.remove("show"), 4000);

// ── BILINGUAL QUESTION BANK ───────────────────────────────────────────────
const QUESTIONS = {
  easy: [
    { en:{q:"Who built the ark?",o:["Moses","Noah","Abraham","David"]}, ta:{q:"யார் பேழையைக் கட்டினார்?",o:["மோசே","நோவா","ஆபிரகாம்","தாவீது"]}, answer:1, ref:"Genesis 6:14" },
    { en:{q:"How many days did it rain during the great flood?",o:["20 days","30 days","40 days","50 days"]}, ta:{q:"பெரும் வெள்ளத்தின்போது எத்தனை நாள் மழை பெய்தது?",o:["20 நாட்கள்","30 நாட்கள்","40 நாட்கள்","50 நாட்கள்"]}, answer:2, ref:"Genesis 7:12" },
    { en:{q:"Who was swallowed by a great fish?",o:["Elijah","Jonah","Daniel","Isaiah"]}, ta:{q:"ஒரு பெரிய மீன் யாரை விழுங்கியது?",o:["எலியா","யோனா","தானியேல்","ஏசாயா"]}, answer:1, ref:"Jonah 1:17" },
    { en:{q:"How many disciples did Jesus choose?",o:["7","10","12","14"]}, ta:{q:"இயேசு எத்தனை சீடர்களைத் தேர்ந்தெடுத்தார்?",o:["7","10","12","14"]}, answer:2, ref:"Matthew 10:1" },
    { en:{q:"Who betrayed Jesus?",o:["Peter","Thomas","Judas","John"]}, ta:{q:"யார் இயேசுவை காட்டிக் கொடுத்தார்?",o:["பேதுரு","தோமா","யூதா","யோவான்"]}, answer:2, ref:"Matthew 26:47-48" },

    { en:{q:"Who wrote most of the Psalms?",o:["Solomon","Moses","David","Asaph"]}, ta:{q:"சங்கீதங்களில் பெரும்பாலானவற்றை யார் எழுதினார்?",o:["சாலொமோன்","மோசே","தாவீது","ஆசாப்"]}, answer:2, ref:"Book of Psalms" },

    { en:{q:"What river was Jesus baptized in?",o:["Nile","Euphrates","Jordan","Galilee"]}, ta:{q:"இயேசு எந்த நதியில் ஞானஸ்நானம் பெற்றார்?",o:["நைல்","யூப்பிரட்டீஸ்","யோர்தான்","கலிலேயா"]}, answer:2, ref:"Matthew 3:13" },
    { en:{q:"Who was Adam s first wife?",o:["Delilah","Ruth","Eve","Esther"]}, ta:{q:"ஆதாமின் முதல் மனைவி யார்?",o:["தெலிலா","ரூத்","ஏவாள்","எஸ்தர்"]}, answer:2, ref:"Genesis 2:22" },

    { en:{q:"What language was the New Testament originally written in?",o:["Hebrew","Latin","Greek","Aramaic"]}, ta:{q:"புதிய ஏற்பாடு முதலில் எந்த மொழியில் எழுதப்பட்டது?",o:["எபிரேயு","லத்தீன்","கிரேக்கம்","அரமேயம்"]}, answer:2, ref:"Bible history" },
    { en:{q:"Who was the first person to see the risen Jesus?",o:["Peter","Mary Magdalene","John","Thomas"]}, ta:{q:"உயிர்த்தெழுந்த இயேசுவை முதலில் யார் பார்த்தார்?",o:["பேதுரு","மகதலேனா மரியாள்","யோவான்","தோமா"]}, answer:1, ref:"John 20:14-16" },

    { en:{q:"Who denied Jesus three times?",o:["John","James","Peter","Andrew"]}, ta:{q:"யார் இயேசுவை மூன்று முறை மறுதலித்தார்?",o:["யோவான்","யாக்கோபு","பேதுரு","அந்திரேயா"]}, answer:2, ref:"Matthew 26:75" },
    { en:{q:"What did the wise men follow to find Jesus?",o:["An angel","A star","A dove","A cloud"]}, ta:{q:"ஞானிகள் இயேசுவைக் கண்டுபிடிக்க எதைப் பின்தொடர்ந்தார்கள்?",o:["ஒரு தூதன்","ஒரு நட்சத்திரம்","ஒரு புறா","ஒரு மேகம்"]}, answer:1, ref:"Matthew 2:9" }

// ── HELPERS ───────────────────────────────────────────────────────────────
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

window.setLang = function(l){
  lang=l;
  document.getElementById("btn-en").classList.toggle("active",l==="en");
  document.getElementById("btn-ta").classList.toggle("active",l==="ta");
  const t=T[l];
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set("main-title",t.title); set("main-subtitle",t.subtitle);
  set("lbl-name",t.lblName); set("lbl-diff",t.lblDiff);
  set("diff-easy",t.diffEasy); set("diff-medium",t.diffMed); set("diff-hard",t.diffHard);
  set("lbl-start-btn",t.startBtn); set("lbl-lb-btn",t.lbBtn);
  set("lbl-loading",t.loading); set("lbl-next",t.next);
  set("lbl-play-again",t.playAgain); set("lbl-lb-title",t.lbTitle);
  set("lbl-lb-sub",t.lbSub); set("lbl-lb-empty",t.lbEmpty); set("lbl-back",t.back);
  set("tab-easy-lb",t.tabEasy); set("tab-med-lb",t.tabMed); set("tab-hard-lb",t.tabHard);
  document.getElementById("player-name").placeholder=l==="en"?"Enter your name...":"உங்கள் பெயர்...";
};

window.selectDiff = function(d,el){
  difficulty=d;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("selected"));
  el.classList.add("selected");
};

window.showScreen = function(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// ── START GAME ────────────────────────────────────────────────────────────
window.startGame = function(){
  playerName=document.getElementById("player-name").value.trim();
  const err=document.getElementById("start-error");
  if(!playerName){err.textContent=T[lang].nameError;err.classList.add("show");return;}
  err.classList.remove("show");
  showScreen("screen-loading");
  setTimeout(()=>{
    const pool=shuffle([...QUESTIONS[difficulty]]).slice(0,10);
    questions=pool; currentQ=0; score=0; correctCount=0;
    showScreen("screen-quiz");
    renderQuestion();
  },600);
};

// ── RENDER QUESTION ───────────────────────────────────────────────────────
function renderQuestion(){
  const q=questions[currentQ], t=T[lang];
  const qData=q[lang];
  document.getElementById("q-counter").textContent=t.qCounter(currentQ+1,questions.length);
  document.getElementById("score-display").textContent=t.scoreLabel(score);
  document.getElementById("question-text").textContent=qData.q;
  document.getElementById("question-ref").textContent="";
  document.getElementById("feedback-bar").className="feedback-bar";
  document.getElementById("next-btn-wrap").className="next-btn-wrap";
  const grid=document.getElementById("options-grid");
  grid.innerHTML="";
  ["A","B","C","D"].forEach((letter,i)=>{
    const btn=document.createElement("button");
    btn.className="option-btn";
    btn.innerHTML=`<span class="opt-letter">${letter}</span><span>${qData.o[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=TIMER[difficulty];
  document.getElementById("timer-bar").style.width="100%";
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer-bar").style.width=(timeLeft/TIMER[difficulty]*100)+"%";
    if(timeLeft<=0){clearInterval(timerInterval);selectAnswer(-1);}
  },1000);
}

function selectAnswer(chosen){
  clearInterval(timerInterval);
  const q=questions[currentQ], t=T[lang], qData=q[lang];
  const btns=document.querySelectorAll(".option-btn");
  btns.forEach(b=>b.disabled=true);
  btns[q.answer].classList.add("correct");
  if(chosen>=0&&chosen!==q.answer)btns[chosen].classList.add("wrong");
  const ok=chosen===q.answer;
  if(ok){score+=POINTS[difficulty]+Math.floor((timeLeft/TIMER[difficulty])*POINTS[difficulty]);correctCount++;}
  const fb=document.getElementById("feedback-bar");
  fb.innerHTML=(ok?t.correct:t.wrong(qData.o[q.answer]))+` <span style="opacity:0.7;font-size:11px;margin-left:8px">📖 ${q.ref}</span>`;
  fb.className="feedback-bar show "+(ok?"correct":"wrong");
  document.getElementById("score-display").textContent=t.scoreLabel(score);
  document.getElementById("next-btn-wrap").className="next-btn-wrap show";
  document.getElementById("lbl-next").textContent=
    currentQ<questions.length-1?t.next:(lang==="en"?"Finish ✓":"முடி ✓");
}

window.nextQuestion=function(){
  currentQ++;
  currentQ>=questions.length?endGame():renderQuestion();
};

// ── END GAME ──────────────────────────────────────────────────────────────
async function endGame(){
  clearInterval(timerInterval);
  const t=T[lang];
  showScreen("screen-result");
  document.getElementById("result-crown").textContent=score>=800?"🏆":score>=500?"⭐":"📖";
  document.getElementById("result-title").textContent=t.resultTitle(score);
  document.getElementById("result-score").textContent=score+" "+t.pts;
  document.getElementById("result-sub").textContent=t.resultSub(correctCount,questions.length);
  const vk=score>=800?"good":score>=500?"mid":"low";
  document.getElementById("result-verse").textContent=t.verse[vk];
  await saveScore();
}

// ── FIREBASE ──────────────────────────────────────────────────────────────
async function saveScore(){
  try{
    await addDoc(collection(db,"leaderboard"),{
      name:playerName,score,correct:correctCount,
      total:questions.length,difficulty,lang,
      date:new Date().toLocaleDateString(),
      createdAt:serverTimestamp()
    });
  }catch(e){console.error("Save failed:",e);}
}

window.showLeaderboard=async function(){
  showScreen("screen-leaderboard");
  document.getElementById("lb-list").innerHTML=
    "<div class=\"lb-empty\"><div class=\"spinner\" style=\"width:24px;height:24px;margin:0 auto 8px;border-width:2px\"></div></div>";
  try{
    const q=query(collection(db,"leaderboard"),orderBy("score","desc"),limit(100));
    const snap=await getDocs(q);
    allScores=snap.docs.map(d=>d.data());
  }catch(e){allScores=[];}
  renderLB();
};

window.filterLB=function(f,el){
  lbFilter=f;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  renderLB();
};

function renderLB(){
  const t=T[lang];
  const filtered=lbFilter==="all"?allScores:allScores.filter(s=>s.difficulty===lbFilter);
  const list=document.getElementById("lb-list");
  if(!filtered.length){list.innerHTML=`<div class="lb-empty">${t.lbEmpty}</div>`;return;}
  const medals=["🥇","🥈","🥉"],rc=["top-1","top-2","top-3"],rk=["gold","silver","bronze"];
  list.innerHTML=filtered.slice(0,20).map((s,i)=>`
    <div class="lb-item ${rc[i]||""}">
      <div class="lb-rank ${rk[i]||""}">${medals[i]||(i+1)}</div>
      <div style="flex:1">
        <div class="lb-name">${s.name}</div>
        <div class="lb-meta">${s.correct}/${s.total} &middot; ${s.difficulty} &middot; ${s.date}</div>
      </div>
      <div class="lb-score">${s.score}</div>
    </div>`).join("");
}

window.resetGame=function(){showScreen("screen-start");};
</script>

    { en:{q:"How many fish did the disciples catch after Jesus told them to cast the net?",o:["100","153","200","212"]}, ta:{q:"இயேசு வலையை போடுங்கள் என்று சொன்னதும் சீடர்கள் எத்தனை மீன் பிடித்தார்கள்?",o:["100","153","200","212"]}, answer:1, ref:"John 21:11" },
    { en:{q:"Who baptized Jesus?",o:["Peter","Elijah","John the Baptist","Philip"]}, ta:{q:"இயேசுவுக்கு யார் ஞானஸ்நானம் கொடுத்தார்?",o:["பேதுரு","எலியா","யோவான் ஸ்நானன்","பிலிப்பு"]}, answer:2, ref:"Matthew 3:13-15" },
    { en:{q:"What was Paul s name before he became a Christian?",o:["Barnabas","Silas","Saul","Stephen"]}, ta:{q:"கிறிஸ்தவராவதற்கு முன் பவுலின் பெயர் என்ன?",o:["பர்னபா","சீலா","சவுல்","ஸ்தேவான்"]}, answer:2, ref:"Acts 9:1" },
    { en:{q:"Which Old Testament prophet was taken to heaven in a chariot of fire?",o:["Elisha","Isaiah","Ezekiel","Elijah"]}, ta:{q:"எந்த பழைய ஏற்பாட்டு தீர்க்கதரிசி அக்கினி தேரில் பரலோகம் சென்றார்?",o:["எலிசா","ஏசாயா","எசேக்கியேல்","எலியா"]}, answer:3, ref:"2 Kings 2:11" },
    { en:{q:"How many plagues did God send on Egypt?",o:["7","8","10","12"]}, ta:{q:"தேவன் எகிப்தில் எத்தனை வாதைகளை அனுப்பினார்?",o:["7","8","10","12"]}, answer:2, ref:"Exodus 7-12" },

    { en:{q:"Which book of the Bible has 150 chapters?",o:["Isaiah","Psalms","Proverbs","Jeremiah"]}, ta:{q:"வேதாகமத்தில் எந்த புத்தகத்தில் 150 அதிகாரங்கள் உள்ளன?",o:["ஏசாயா","சங்கீதம்","நீதிமொழிகள்","எரேமியா"]}, answer:1, ref:"Book of Psalms" },
    { en:{q:"Who was the first Christian martyr?",o:["Peter","James","Stephen","Paul"]}, ta:{q:"முதல் கிறிஸ்தவ மறைசாட்சி யார்?",o:["பேதுரு","யாக்கோபு","ஸ்தேவான்","பவுல்"]}, answer:2, ref:"Acts 7:59-60" },

    { en:{q:"Which woman hid the two spies sent by Joshua?",o:["Deborah","Ruth","Rahab","Esther"]}, ta:{q:"யோசுவா அனுப்பிய இரண்டு ஒற்றர்களை எந்த பெண் மறைத்தாள்?",o:["தெபோரா","ரூத்","ராகாப்","எஸ்தர்"]}, answer:2, ref:"Joshua 2:4" },

    { en:{q:"Who was Isaac s wife?",o:["Rachel","Leah","Rebekah","Sarah"]}, ta:{q:"ஈசாக்கின் மனைவி யார்?",o:["ராகேல்","லேயா","ரெபேக்கா","சாராள்"]}, answer:2, ref:"Genesis 24:67" },

    { en:{q:"Who was the first person to be called a Hebrew in the Bible?",o:["Noah","Abraham","Isaac","Jacob"]}, ta:{q:"வேதாகமத்தில் எபிரேயன் என்று முதல் முதலில் அழைக்கப்பட்டவர் யார்?",o:["நோவா","ஆபிரகாம்","ஈசாக்கு","யாக்கோபு"]}, answer:1, ref:"Genesis 14:13" },
    { en:{q:"What instrument did David play?",o:["Trumpet","Harp","Flute","Drum"]}, ta:{q:"தாவீது எந்த இசைக்கருவி வாசித்தார்?",o:["எக்காளம்","சுரமண்டலம்","புல்லாங்குழல்","மேளம்"]}, answer:1, ref:"1 Samuel 16:23" },

};

// ── STATE ─────────────────────────────────────────────────────────────────
let lang = "en", difficulty = "easy", playerName = "";
let questions = [], currentQ = 0, score = 0, correctCount = 0;
let timerInterval = null, timeLeft = 0, allScores = [], lbFilter = "all";
const TIMER  = {easy:30, medium:20, hard:15};
const POINTS = {easy:100, medium:150, hard:200};

// ── TRANSLATIONS ──────────────────────────────────────────────────────────
const T = {

    back:"பின்னால்", nameError:"தொடர உங்கள் பெயரை உள்ளிடவும்.",

// ── HELPERS ───────────────────────────────────────────────────────────────
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

window.setLang = function(l){
  lang=l;
  document.getElementById("btn-en").classList.toggle("active",l==="en");
  document.getElementById("btn-ta").classList.toggle("active",l==="ta");
  const t=T[l];
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set("main-title",t.title); set("main-subtitle",t.subtitle);
  set("lbl-name",t.lblName); set("lbl-diff",t.lblDiff);
  set("diff-easy",t.diffEasy); set("diff-medium",t.diffMed); set("diff-hard",t.diffHard);
  set("lbl-start-btn",t.startBtn); set("lbl-lb-btn",t.lbBtn);
  set("lbl-loading",t.loading); set("lbl-next",t.next);
  set("lbl-play-again",t.playAgain); set("lbl-lb-title",t.lbTitle);
  set("lbl-lb-sub",t.lbSub); set("lbl-lb-empty",t.lbEmpty); set("lbl-back",t.back);
  set("tab-easy-lb",t.tabEasy); set("tab-med-lb",t.tabMed); set("tab-hard-lb",t.tabHard);
  document.getElementById("player-name").placeholder=l==="en"?"Enter your name...":"உங்கள் பெயர்...";
};

window.selectDiff = function(d,el){
  difficulty=d;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("selected"));
  el.classList.add("selected");
};

window.showScreen = function(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// ── START GAME ────────────────────────────────────────────────────────────
window.startGame = function(){
  playerName=document.getElementById("player-name").value.trim();
  const err=document.getElementById("start-error");
  if(!playerName){err.textContent=T[lang].nameError;err.classList.add("show");return;}
  err.classList.remove("show");
  showScreen("screen-loading");
  setTimeout(()=>{
    const pool=shuffle([...QUESTIONS[difficulty]]).slice(0,10);
    questions=pool; currentQ=0; score=0; correctCount=0;
    showScreen("screen-quiz");
    renderQuestion();
  },600);
};

// ── RENDER QUESTION ───────────────────────────────────────────────────────
function renderQuestion(){
  const q=questions[currentQ], t=T[lang];
  const qData=q[lang];
  document.getElementById("q-counter").textContent=t.qCounter(currentQ+1,questions.length);
  document.getElementById("score-display").textContent=t.scoreLabel(score);
  document.getElementById("question-text").textContent=qData.q;
  document.getElementById("question-ref").textContent="";
  document.getElementById("feedback-bar").className="feedback-bar";
  document.getElementById("next-btn-wrap").className="next-btn-wrap";
  const grid=document.getElementById("options-grid");
  grid.innerHTML="";
  ["A","B","C","D"].forEach((letter,i)=>{
    const btn=document.createElement("button");
    btn.className="option-btn";
    btn.innerHTML=`<span class="opt-letter">${letter}</span><span>${qData.o[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=TIMER[difficulty];
  document.getElementById("timer-bar").style.width="100%";
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer-bar").style.width=(timeLeft/TIMER[difficulty]*100)+"%";
    if(timeLeft<=0){clearInterval(timerInterval);selectAnswer(-1);}
  },1000);
}

function selectAnswer(chosen){
  clearInterval(timerInterval);
  const q=questions[currentQ], t=T[lang], qData=q[lang];
  const btns=document.querySelectorAll(".option-btn");
  btns.forEach(b=>b.disabled=true);
  btns[q.answer].classList.add("correct");
  if(chosen>=0&&chosen!==q.answer)btns[chosen].classList.add("wrong");
  const ok=chosen===q.answer;
  if(ok){score+=POINTS[difficulty]+Math.floor((timeLeft/TIMER[difficulty])*POINTS[difficulty]);correctCount++;}
  const fb=document.getElementById("feedback-bar");
  fb.innerHTML=(ok?t.correct:t.wrong(qData.o[q.answer]))+` <span style="opacity:0.7;font-size:11px;margin-left:8px">📖 ${q.ref}</span>`;
  fb.className="feedback-bar show "+(ok?"correct":"wrong");
  document.getElementById("score-display").textContent=t.scoreLabel(score);
  document.getElementById("next-btn-wrap").className="next-btn-wrap show";
  document.getElementById("lbl-next").textContent=
    currentQ<questions.length-1?t.next:(lang==="en"?"Finish ✓":"முடி ✓");
}

window.nextQuestion=function(){
  currentQ++;
  currentQ>=questions.length?endGame():renderQuestion();
};

// ── END GAME ──────────────────────────────────────────────────────────────
async function endGame(){
  clearInterval(timerInterval);
  const t=T[lang];
  showScreen("screen-result");
  document.getElementById("result-crown").textContent=score>=800?"🏆":score>=500?"⭐":"📖";
  document.getElementById("result-title").textContent=t.resultTitle(score);
  document.getElementById("result-score").textContent=score+" "+t.pts;
  document.getElementById("result-sub").textContent=t.resultSub(correctCount,questions.length);
  const vk=score>=800?"good":score>=500?"mid":"low";
  document.getElementById("result-verse").textContent=t.verse[vk];
  await saveScore();
}

// ── FIREBASE ──────────────────────────────────────────────────────────────
async function saveScore(){
  try{
    await addDoc(collection(db,"leaderboard"),{
      name:playerName,score,correct:correctCount,
      total:questions.length,difficulty,lang,
      date:new Date().toLocaleDateString(),
      createdAt:serverTimestamp()
    });
  }catch(e){console.error("Save failed:",e);}
}

window.showLeaderboard=async function(){
  showScreen("screen-leaderboard");
  document.getElementById("lb-list").innerHTML=
    "<div class=\"lb-empty\"><div class=\"spinner\" style=\"width:24px;height:24px;margin:0 auto 8px;border-width:2px\"></div></div>";
  try{
    const q=query(collection(db,"leaderboard"),orderBy("score","desc"),limit(100));
    const snap=await getDocs(q);
    allScores=snap.docs.map(d=>d.data());
  }catch(e){allScores=[];}
  renderLB();
};

window.filterLB=function(f,el){
  lbFilter=f;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  renderLB();
};

function renderLB(){
  const t=T[lang];
  const filtered=lbFilter==="all"?allScores:allScores.filter(s=>s.difficulty===lbFilter);
  const list=document.getElementById("lb-list");
  if(!filtered.length){list.innerHTML=`<div class="lb-empty">${t.lbEmpty}</div>`;return;}
  const medals=["🥇","🥈","🥉"],rc=["top-1","top-2","top-3"],rk=["gold","silver","bronze"];
  list.innerHTML=filtered.slice(0,20).map((s,i)=>`
    <div class="lb-item ${rc[i]||""}">
      <div class="lb-rank ${rk[i]||""}">${medals[i]||(i+1)}</div>
      <div style="flex:1">
        <div class="lb-name">${s.name}</div>
        <div class="lb-meta">${s.correct}/${s.total} &middot; ${s.difficulty} &middot; ${s.date}</div>
      </div>
      <div class="lb-score">${s.score}</div>
    </div>`).join("");
}

window.resetGame=function(){showScreen("screen-start");};
</script>
